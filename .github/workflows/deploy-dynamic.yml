name: Deploy Dynamic App

on:
  push:
    branches:
      - main
    paths:
      - "web_dinamis/**"
      - "database/**"
      - "nginx/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy-dynamic.yml"

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push dynamic image
        uses: docker/build-push-action@v6
        with:
          context: ./web_dinamis
          push: true
          tags: ${{ secrets.DYNAMIC_IMAGE }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/UAS_ADMServer
            git pull origin main

            cat > .env <<'EOF'
            HTTP_PORT=80
            STATIC_IMAGE=${{ secrets.STATIC_IMAGE }}
            DYNAMIC_IMAGE=${{ secrets.DYNAMIC_IMAGE }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            EOF

            docker compose pull web_dinamis
            docker compose up -d mariadb
            docker compose up -d --no-deps web_dinamis
            docker compose up -d reverse-proxy
            docker image prune -f